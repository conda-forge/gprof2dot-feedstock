{% set name = "gprof2dot" %}
{% set version = "2025.4.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/gprof2dot-{{ version }}.tar.gz
  sha256: 35743e2d2ca027bf48fa7cba37021aaf4a27beeae1ae8e05a50b55f1f921a6ce

build:
  entry_points:
    - gprof2dot = gprof2dot:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - gprof2dot
  commands:
    - pip check
    - gprof2dot --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/jrfonseca/gprof2dot
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: LICENSE.txt
  summary: Generate a dot graph from the output of several profilers.

extra:
  recipe-maintainers:
    - rxm7706
    - pmgrafe
